<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Démo de mise en page responsive en HTML et CSS : grille de cartes, image fluide et deux colonnes flexibles avec Flexbox.">
    <title>Démo responsive</title>
    <link rel="stylesheet" href="assets/styles/style.css">
</head>
<body>
    <header class="headerContainer">

        <!-- Website logo -->
        <div class="logoContainer">
            Logo
        </div>

        <!-- Main navigation -->
        <nav class="navContainer">
            <ul class="menuContainer">
                <li>
                    <a href="#card">Cartes</a>
                </li>
                <li>
                    <a href="#image">Image</a>
                </li>
                <li>
                    <a href="#columns">Colonnes</a>
                </li>
            </ul>
        </nav>
    </header>
    <main>

        <!-- Main title -->
        <h1>Démo responsive</h1>

        <!-- Responsive cards section -->
        <section id="card">
            <h2>
                Cartes responsives
            </h2>
            <div class="cardContainer">
                <div class="card">Carte 1</div>
                <div class="card">Carte 2</div>
                <div class="card">Carte 3</div>
                <div class="card">Carte 4</div>
            </div>
        </section>

        <!-- Responsive image section -->
        <section id="image">
            <h2>
                Image responsive
            </h2>
            <div class="imageContainer">
                <img  class="responsiveImage" src="assets/images/png.webp" alt="Image de démonstration responsive affichant un bloc 600 par 300 pixels">
            </div>
        </section>
        <section id="columns">
            <h2>
                Deux colonnes flexibles
            </h2>
            <div class="flexColumn">
                <div class="column">
                    Column A
                </div>
                <div class="column">
                    Column B
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <div>
            © 2025 Simple Responsive
        </div>
        <div>
            Flexbox & Unité seulement
        </div>
    </footer>

</body>
</html>
